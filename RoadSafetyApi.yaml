openapi: 3.1.0
info:
  title: RoadSafety API
  version: "1.0.0"
  description: |
    REST API для приложения RoadSafety.
    Один клиент используется и для родителей, и для детей, а роль пользователя хранится на сервере
    и задаётся при подключении к семье.

    Основной поток:
    1. Родитель регистрируется (без роли).
    2. Родитель присоединяется к семье или создаёт новую семью (становится parent).
    3. Родитель генерирует одноразовый код для ребёнка.
    4. Ребёнок регистрируется (без роли).
    5. Ребёнок вводит код.
    6. Сервер устанавливает ребёнку роль child и создаёт запись FamilyMember.

servers:
  - url: http://localhost:5103/api
    description: Local development server

tags:
  - name: Auth
  - name: Users
  - name: Families

security:
  - BearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: |
        Создаёт аккаунт с email или номером телефона и сразу возвращает access/refresh токены.
        Роль пользователя будет установлена при подключении к семье.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Email or phone already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Авторизация по email или телефону и паролю.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh tokens
      operationId: refreshTokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokensRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokensResponse"
        "401":
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Инвалидирует refresh token текущей сессии.
      operationId: logoutUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogOutRequest"
      responses:
        "204":
          description: Logged out
        "401":
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    
  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: |
        Возвращает профиль текущего авторизованного пользователя. 
        Если пользователь не состоит в семье, `familyId` в ответе будет равен `null`.
      operationId: getCurrentUser
      security:
        - BearerAuth: [ ]
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /families:
    post:
      tags:
        - Families
      summary: Create family
      description: |
        При создании семьи пользователю устанавливается роль `parent`.
        Сервер автоматически создаёт запись FamilyMember для текущего пользователя.
      operationId: createFamily
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyRequest"
      responses:
        "201":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFamilyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /families/{familyId}/members:
    get:
      tags:
        - Families
      summary: List family members
      description: Возвращает id и роль участников семьи.
      operationId: listFamilyMembers
      security:
        - BearerAuth: []
      parameters:
        - name: familyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Family identifier
      responses:
        "200":
          description: Family members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFamilyMembersResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /families/invite-code:
    post:
      tags:
        - Families
      summary: Generate family invite code
      description: |
        Только для родителя, состоящего в семье.
        Генерирует одноразовый код для приглашения других пользователей в семью с указанной ролью.
      operationId: createInviteCode
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteCodeRequest"
      responses:
        "200":
          description: Invite code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteCodeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Family or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /families/join-by-invite:
    post:
      tags:
        - Families
      summary: Join family using invite code
      description: |
        По валидному одноразовому коду сервер создаёт запись FamilyMember и добавляет пользователя в семью.
      operationId: joinFamilyByInviteCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinFamilyByInviteCodeRequest"
      responses:
        "200":
          description: Successfully joined family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinFamilyByInviteCodeResponse"
        "400":
          description: Validation error (e.g. code expired, user already in family)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Invite code or family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetails:
      type: object
      description: RFC 7807 problem details (ASP.NET Core output)
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true

    RegisterRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: Email или телефон.
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          description: Email или телефон.
        password:
          type: string
          format: password

    RefreshTokensRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    LogOutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required:
        - userId
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      properties:
        userId:
          type: string
          format: uuid
          description: Unique identifier of the authenticated user.
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
          description: Absolute expiration time of the access token.
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
          description: Absolute expiration time of the refresh token.

    RefreshTokensResponse:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time

    UserResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        phoneNumber:
          type: string
          nullable: true
          example: "+79991234567"
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        patronymic:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        familyId:
          type: string
          format: uuid
          nullable: true

    CreateFamilyRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          description: Название семьи (опционально).

    CreateFamilyResponse:
      type: object
      required:
        - familyId
        - createdByUserId
      properties:
        familyId:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        createdByUserId:
          type: string
          format: uuid

    GetFamilyMembersResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberDto"

    MemberDto:
      type: object
      required:
        - id
        - role
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          description: Роль участника в семье (Parent, Child).

    CreateInviteCodeRequest:
      type: object
      required:
        - inviteCodeRole
      properties:
        inviteCodeRole:
          type: string
          description: Роль, для которой создаётся код (Parent или Child).

    CreateInviteCodeResponse:
      type: object
      required:
        - inviteCode
      properties:
        inviteCode:
          type: string
          description: Одноразовый код приглашения.

    JoinFamilyByInviteCodeRequest:
      type: object
      required:
        - inviteCode
      properties:
        inviteCode:
          type: string

    JoinFamilyByInviteCodeResponse:
      type: object
      required:
        - userId
        - familyId
        - role
      properties:
        userId:
          type: string
          format: uuid
        familyId:
          type: string
          format: uuid
        role:
          type: string
          description: Роль, присвоенная пользователю в семье.
